<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Memories of School · lipatan gambar</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block style %}
    {% endblock %}
</head>
<body>

    <!-- NAVIGASI ATAS -->
    <div class="top-nav">
        <div class="nav-container">
            <div class="text-item-right">
                <i class="bi bi-person-circle"></i>
                <span>{{ session.get('nama') }}</span>
            </div>
        </div>
    </div>

    <!-- SIDEBAR KIRI -->
    <div class="sidebar">
        <h5><i class="bi bi-image">  </i>MEMORIES <br> OF SCHOOL</h5>

        <a href="{{url_for('admin')}}"><i class="bi bi-house"></i> Beranda</a>
        <a href="{{url_for('foto_acak_admin')}}"><i class="bi bi-search"></i> Pencarian Pintar</a>
        <a href="{{url_for('admin')}}"><i class="bi bi-images"></i>media</a>

        <div class="login-btn">
            <a href="{{url_for('index')}}" class="btn-login"><i class="bi bi-box-arrow-in-right me-2"></i>log out</a>
        </div>
    </div>

    <!-- MAIN CONTENT -->
     
    <div class="main-content">
{% block content %}
{% endblock %}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    {% block script %}
    {% endblock %}
</body>
</html>
