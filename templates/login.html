<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Memories of School</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>

<body class="d-flex justify-content-center align-items-center">

  <div class="login-card text-center shadow">
    
    <div class="header-with-logo">
      <div class="logo-icon">
        <i class="bi bi-image"></i>
      </div>
      <h5 class="fw-bold">MEMORIES<br>OF SCHOOL</h5>
    </div>
    
    <h4 class="mb-4">Selamat Datang</h4>

    <!-- Form Login - Fluid / Full Width dengan Border Hitam -->
    <form method="POST" action="{{ url_for('login') }}" style="width: 100%;">
      
      <!-- Username Field - Full Width -->
      <div class="form-group">
        <label for="username" class="form-label">Username</label>
        <input type="text" 
               class="form-control" 
               id="username"
               name="username"
               placeholder="Masukan Username"
               required>
      </div>

      <!-- Email Field - Full Width -->
      <div class="form-group">
        <label for="email" class="form-label">Email</label>
        <input type="email" 
               class="form-control" 
               id="email"
               name="email"
               placeholder="Masukan Email"
               required>
      </div>

      <!-- Password Field - Full Width -->
      <div class="form-group">
        <label for="password" class="form-label">Password</label>
        <input type="password" 
               class="form-control" 
               id="password"
               name="password"
               placeholder="Masukan Password"
               required>
      </div>

      <!-- Garis pemisah hitam (opsional) -->
      <div class="form-divider"></div>

      <!-- Submit Button - Full Width dengan Border Hitam -->
      <button type="submit" class="btn-custom">MASUK</button>
    </form>

    <!-- Footer -->
    <div class="footer-text">
      © 2025 <span>MoS</span>
    </div>

  </div>

  <!-- Bootstrap JS (optional) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
